{{- define "main" }}
<div class="post-single">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
  </header>
  <div class="category-cards">
    {{- range .Data.Terms.Alphabetical }}
    {{- $category := .Page }}
    <a class="category-card" href="{{ $category.Permalink }}">
      <div class="category-card__header">
        <h2>{{ $category.Title }}</h2>
        <span class="category-card__count">{{ .Count }} post{{ if gt .Count 1 }}s{{ end }}</span>
      </div>
      {{- with $category.Params.description }}
      <p class="category-card__desc">{{ . }}</p>
      {{- end }}
    </a>
    {{- end }}
  </div>
</div>
{{- end }}
